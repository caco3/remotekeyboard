name: Build APK and AAB

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/keystore.jks"

      - name: Build signed release APK and AAB
        run: ./gradlew assembleRelease bundleRelease
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename release artifacts
        run: |
          TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          if [ -n "$TAG" ]; then
            BASENAME="RemoteKeyboard-${TAG}"
          else
            COMMIT=$(git rev-parse --short HEAD)
            BASENAME="RemoteKeyboard-${COMMIT}"
          fi
          APK_NAME="${BASENAME}.apk"
          AAB_NAME="${BASENAME}.aab"
          mv app/build/outputs/apk/release/app-release*.apk "app/build/outputs/apk/release/${APK_NAME}"
          mv app/build/outputs/bundle/release/app-release*.aab "app/build/outputs/bundle/release/${AAB_NAME}"
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV
          echo "AAB_NAME=${AAB_NAME}" >> $GITHUB_ENV

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/${{ env.APK_NAME }}
          retention-days: 30

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/${{ env.AAB_NAME }}
          retention-days: 30

      - name: Attach APK and AAB to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/${{ env.APK_NAME }}
            app/build/outputs/bundle/release/${{ env.AAB_NAME }}
